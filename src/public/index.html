<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; margin-top: 10px; border-radius: 5px; align-items: center; }
        .btn-edit { background: #ffc107; width: auto; color: black; margin-right: 5px; }
        .btn-delete { background: #dc3545; width: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Registrar Estudiante</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="carrera" placeholder="Carrera">
        <button onclick="guardar()">Guardar en Railway</button>
        <div id="lista"></div>
    </div>

    <script>
        const url = '/api/estudiantes';

        async function cargar() {
            const res = await fetch(url);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            data.forEach(est => {
                lista.innerHTML += `
                    <div class="item">
                        <span>${est.nombre}</span>
                        <div>
                            <button class="btn-edit" onclick="editar(${est.id}, '${est.nombre}', '${est.carrera}')">✏️</button>
                            <button class="btn-delete" onclick="borrar(${est.id})">🗑️</button>
                        </div>
                    </div>`;
            });
        }

        async function guardar() {
            const nombre = document.getElementById('nombre').value;
            const carrera = document.getElementById('carrera').value;
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, carrera })
            });
            location.reload();
        }

        async function borrar(id) {
            if(confirm('¿Borrar?')) {
                await fetch(`${url}/${id}`, { method: 'DELETE' });
                cargar();
            }
        }

        async function editar(id, n, c) {
            const nuevoN = prompt("Nuevo nombre:", n);
            const nuevaC = prompt("Nueva carrera:", c);
            if(nuevoN && nuevaC) {
                await fetch(`${url}/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nombre: nuevoN, carrera: nuevaC })
                });
                cargar();
            }
        }
        cargar();
    </script>
</body>
</html>
